<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AI 3D Print Designer{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <style>
    #viewer { width: 100%; height: 460px; background: #15181d; border-radius: .5rem; }
    .param-row label { font-size: .85rem; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand bg-body-tertiary border-bottom mb-4">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="/">🧩 AI 3D Print Designer</a>
      <span class="navbar-text small text-secondary">internal · Anycubic Slicer Next / ACE Pro</span>
    </div>
  </nav>
  <div class="container pb-5">
    {% block content %}{% endblock %}
  </div>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
