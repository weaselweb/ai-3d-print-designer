services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MESHY_API_KEY: ${MESHY_API_KEY:-}
      TRIPO_API_KEY: ${TRIPO_API_KEY:-}
      RODIN_API_KEY: ${RODIN_API_KEY:-}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      DATA_DIR: ${DATA_DIR:-./data}
    volumes:
      - ./data:/app/data
